<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HealthCare Plus</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>HealthCare Plus</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#services">Services</a>
    <a href="#appointment">Appointment</a>
  </nav>
</header>

<section class="hero">
  <h2>Your Health, Our Priority</h2>
  <p>Modern healthcare services with trusted doctors.</p>
</section>

<section id="services" class="services">
  <div class="card">
    <h3>General Checkup</h3>
    <p>Complete health monitoring services.</p>
  </div>

  <div class="card">
    <h3>Emergency Care</h3>
    <p>24/7 emergency support available.</p>
  </div>

  <div class="card">
    <h3>Laboratory</h3>
    <p>Advanced pathology and diagnostics.</p>
  </div>
</section>

<section id="appointment" class="appointment">

  <h2>Book Appointment</h2>

  <form id="appointmentForm">

    <input type="text" id="name" placeholder="Enter Name" required>

    <input type="email" id="email" placeholder="Enter Email" required>

    <input type="date" id="date" required>

    <button type="submit">Book Now</button>

  </form>

</section>

<script src="script.js"></script>

</body>
</html>
